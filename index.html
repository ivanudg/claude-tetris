<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        role="switch"
        aria-checked="false"
        aria-label="Cambiar a modo claro"
        title="Cambiar tema"
      >
        <span class="theme-toggle-icons" aria-hidden="true">
          <span>🌙</span>
          <span>☀️</span>
        </span>
        <span class="theme-toggle-thumb" aria-hidden="true"></span>
      </button>
      <button
        id="mute-toggle"
        class="mute-toggle"
        type="button"
        role="switch"
        aria-checked="true"
        aria-label="Silenciar sonido"
        title="Sonido"
      >🔊</button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div id="combo-indicator" class="combo-indicator hidden">
          <span class="label">COMBO</span>
          <span class="combo-count" id="combo-count">x2</span>
        </div>

        <div id="b2b-badge" class="b2b-badge hidden">BACK-TO-BACK</div>

        <div id="freeze-indicator" class="freeze-indicator hidden">
          ❄️ <span id="freeze-time"></span>s
        </div>

        <div class="panel-section powerup-legend">
          <span class="label">POWER-UPS</span>
          <ul>
            <li><span class="powerup-icon">💣</span> Bomba</li>
            <li><span class="powerup-icon">⚡</span> Rayo</li>
            <li><span class="powerup-icon">🎨</span> Tinte</li>
            <li><span class="powerup-icon">⬇️</span> Gravedad</li>
            <li><span class="powerup-icon">❄️</span> Congelar</li>
          </ul>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
