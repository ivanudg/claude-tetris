<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        role="switch"
        aria-checked="false"
        aria-label="Cambiar a modo claro"
        title="Cambiar tema"
      >
        <span class="theme-toggle-icons" aria-hidden="true">
          <span>🌙</span>
          <span>☀️</span>
        </span>
        <span class="theme-toggle-thumb" aria-hidden="true"></span>
      </button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="name-entry" class="name-entry hidden">
          <label for="name-input" class="name-entry-label">¡Nuevo récord! Escribe tu nombre:</label>
          <div class="name-entry-row">
            <input
              id="name-input"
              class="name-input"
              type="text"
              maxlength="12"
              placeholder="Anónimo"
              autocomplete="off"
            />
            <button id="save-score-btn" class="save-score-btn" type="button">Guardar</button>
          </div>
        </div>

        <div id="scores-panel" class="scores-panel">
          <h3 class="scores-title">MEJORES PUNTUACIONES</h3>
          <table class="scores-table">
            <tbody id="scores-body"></tbody>
          </table>
          <div class="scores-stats">
            <span>Líneas máximas: <b id="stat-max-lines">0</b></span>
            <span>Nivel máximo: <b id="stat-max-level">0</b></span>
          </div>
          <button id="reset-scores-btn" class="reset-scores-btn" type="button">Borrar récords</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
